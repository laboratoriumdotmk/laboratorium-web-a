services:
  app:
    build: .
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URI=postgresql://laboratorium:laboratorium@db:5432/laboratorium

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: laboratorium
      POSTGRES_PASSWORD: laboratorium
      POSTGRES_DB: laboratorium
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U laboratorium']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
